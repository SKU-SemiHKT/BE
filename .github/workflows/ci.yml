name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: skuthon
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create application-secret.yml for CI
        run: |
          cat <<EOF > src/main/resources/application-secret.yml
          spring:
            datasource:
              url: jdbc:mysql://localhost:3306/skuthon
              username: root
              password: root
            jpa:
              hibernate:
                ddl-auto: create
              properties:
                hibernate:
                  dialect: org.hibernate.dialect.MySQLDialect
          EOF

      - name: Build and test
        run: ./gradlew build
